  <title>MedConnect</title>

  <link rel="stylesheet" href="../test-style.css">
  <script src="general-care-script.js" defer></script>
</head>

<body>
  <div class="layout">
    <header>
      <a href="mdk-main.html"><img src="../../img/arr-back-black.png"></a>
      <h1>Тест по МДК 04.04</h1>
    </header>

    <section class="header-text">
      <img src="../../img/tests-img/desinfectants.png">
      <ul>
        <li>Тест №1</li>
        <li>Осуществление сестринского ухода</li>
      </ul>

      <div class="timer">
        <img src="../../img/tests-img/timer-icon.png">
        <span id="timer">00:00</span>
      </div>
    </section>

    <section class="progress-container">
      <div class="progress-text">

        <span id="progress-step">Вопрос 0 из 0</span>

        <span id="progress-percent">0%</span>
  
    </div>

  
    <div class="progress-bar-bg">

  
      <div id="progress-fill" class="progress-bar-fill"></div>

      </div>
    </section>

    <main>
      <div id="test-area" class="test-area">
        <span class="question" id="test-question"></span>

        <div id="answers-container" class="answers-list">
        </div>

        <div class="buttons">
          <button type="button" id="back-btn" class="back-btn">Назад</button>
          <button type="button" id="forward-btn" class="forward-btn">Далее</button>
        </div>
      </div>

      <div id="finish-area" class="finish-area">
        <div id="finish-text"></div>
        <button type="button" id="quit-btn" class="quit-btn">Завершить тест</button>
      </div>
    </main>

    <footer>
      <ul>
        <li>
          <div class="locked"><img src="../../img/locked.png"></div>
          <a><img src="../../img/stats.png"></a>
        </li>
        <li>
          <div class="locked"></div>
          <a><img src="../../img/mail.png"></a>
        </li>
        <li>
          <div class="locked"><img src="../../img/locked.png"></div>
          <a><img src="../../img/settings.png"></a>
        </li>
        <li>
          <div class="locked"><img src="../../img/locked.png"></div>
          <a><img src="../../img/profile.png"></a>
        </li>
      </ul>
    </footer>
  </div>
</body>
